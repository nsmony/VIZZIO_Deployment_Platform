server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend returns X-Accel-Redirect to this internal location after
    # validating the signed download token and user access.
    location /_vizzio_downloads/ {
        internal;
        alias /var/www/vizzio/builds/;
        sendfile on;
        tcp_nopush on;
        aio threads;
        directio 8m;
        output_buffers 1 1m;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "private, no-store" always;
    }

    error_log /var/log/nginx/vizzio-error.log;
    access_log /var/log/nginx/vizzio-access.log;
}
